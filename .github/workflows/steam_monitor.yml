name: Steam Chart Monitor

on:
  schedule:
    # 매일 한국시간 오후 8시 (UTC 11:00)
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '⚠ Dry-run (테스트 실행 — 저장 안 함)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  monitor-steam-charts:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt --quiet

      - name: 기존 Excel 상태 확인
        run: |
          if [ -f steam_chart_monitor.xlsx ]; then
            echo "✓ Excel 존재: $(du -h steam_chart_monitor.xlsx | cut -f1)"
            echo "  행 수: $(python -c "import pandas as pd; df=pd.read_excel('steam_chart_monitor.xlsx',sheet_name='일별 스냅샷'); print(f'{len(df)}행 ({df[\"날짜\"].nunique()}일치)')" 2>/dev/null || echo "읽기 실패")"
          else
            echo "⚠ Excel 파일 없음 (첫 실행 또는 미커밋)"
          fi

      - name: Steam 차트 데이터 수집
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python steam_chart_monitor.py --dry-run
          else
            python steam_chart_monitor.py
          fi

      - name: 날짜 환경변수 설정
        run: echo "TODAY=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: 파일 저장소에 커밋
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add steam_chart_monitor.xlsx docs/data.json
          git diff --staged --quiet || git commit -m "📊 Steam 차트 업데이트: $(date +'%Y-%m-%d')"
          git push

      - name: 이메일로 결과 전송
        if: github.event.inputs.dry_run != 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "📊 Steam Chart Monitor - ${{ env.TODAY }}"
          to: ar.yun@line.games
          from: Steam Chart Monitor <${{ secrets.GMAIL_USERNAME }}>
          body: |
            오늘(${{ env.TODAY }}) Steam 인기 차트가 업데이트되었습니다.

            👉 대시보드 바로가기:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

            ---
            본 메일은 GitHub Actions를 통해 자동 발송됩니다.
